function Dashboard(){
  const [tab,setTab]=useState("overview");
  const [view,setView]=useState("assets");
  const [selDes,setSelDes]=useState("All");
  const [paceView,setPaceView]=useState("assets");
  const [paceChart,setPaceChart]=useState("cumulative");
  const [bwMonth,setBwMonth]=useState("Feb 26");
  const [bwSort,setBwSort]=useState("util");

  const totSfx={t:agg(MONTHLY,"sfxT"),a:agg(MONTHLY,"sfxA"),min:agg(MONTHLY,"sfxMin"),rw:agg(MONTHLY,"sfxRw")};
  const totWoms={t:agg(MONTHLY,"womsT"),a:agg(MONTHLY,"womsA"),min:agg(MONTHLY,"womsMin"),rw:agg(MONTHLY,"womsRw")};
  const totAll={t:totSfx.t+totWoms.t,a:totSfx.a+totWoms.a,min:totSfx.min+totWoms.min,rw:totSfx.rw+totWoms.rw};

  const des6mo=useMemo(()=>{
    const map={};
    SFX_DES.forEach(r=>{if(!map[r.d])map[r.d]={name:r.d,sfxA:0,sfxT:0,sfxMin:0,womsA:0,womsT:0,womsMin:0};map[r.d].sfxA+=r.a;map[r.d].sfxT+=r.t;map[r.d].sfxMin+=r.min;});
    WOMS_DES.forEach(r=>{if(!map[r.d])map[r.d]={name:r.d,sfxA:0,sfxT:0,sfxMin:0,womsA:0,womsT:0,womsMin:0};map[r.d].womsA+=r.a;map[r.d].womsT+=r.t;map[r.d].womsMin+=r.min;});
    return Object.values(map).map(d=>({...d,totA:d.sfxA+d.womsA,totT:d.sfxT+d.womsT,totMin:d.sfxMin+d.womsMin,totH:((d.sfxMin+d.womsMin)/60).toFixed(1)})).sort((a,b)=>b.totA-a.totA);
  },[]);

  const allDes=["All",...des6mo.map(d=>d.name)];
  const desMoHistory=useMemo(()=>{
    const sfxF=selDes==="All"?SFX_DES:SFX_DES.filter(r=>r.d===selDes);
    const womsF=selDes==="All"?WOMS_DES:WOMS_DES.filter(r=>r.d===selDes);
    const map={};MONTHS_ORDER.forEach(m=>{map[m]={m,sfxA:0,womsA:0,sfxMin:0,womsMin:0};});
    sfxF.forEach(r=>{if(map[r.m]){map[r.m].sfxA+=r.a;map[r.m].sfxMin+=r.min;}});
    womsF.forEach(r=>{if(map[r.m]){map[r.m].womsA+=r.a;map[r.m].womsMin+=r.min;}});
    return MONTHS_ORDER.map(m=>({...map[m],totA:map[m].sfxA+map[m].womsA}));
  },[selDes]);
  const desDetail=useMemo(()=>{
    if(selDes==="All")return[];
    return MONTHS_ORDER.map(m=>{
      const sx=SFX_DES.find(r=>r.d===selDes&&r.m===m)||{a:0,t:0,min:0};
      const wo=WOMS_DES.find(r=>r.d===selDes&&r.m===m)||{a:0,t:0,min:0};
      return{m,sfxA:sx.a,sfxT:sx.t,sfxH:Math.round(sx.min/60),womsA:wo.a,womsT:wo.t,womsH:Math.round(wo.min/60),totA:sx.a+wo.a,totH:Math.round((sx.min+wo.min)/60)};
    });
  },[selDes]);

  // Pace data
  const getVal=(src,m,i,field)=>{const d=src[m];return d&&d[i]?(field==="assets"?d[i].a:field==="tasks"?d[i].t:Math.round(d[i].min/60)):0;};
  const paceDailyData=useMemo(()=>Array.from({length:10},(_,i)=>{const row={day:"Day "+(i+1)};MONTHS_ORDER.forEach(m=>{row[m]=getVal(SFX_D10,m,i,paceView)+getVal(WOMS_D10,m,i,paceView);});return row;}),[paceView]);
  const paceCumData=useMemo(()=>Array.from({length:10},(_,i)=>{const row={day:"Day "+(i+1)};MONTHS_ORDER.forEach(m=>{let s=0;for(let j=0;j<=i;j++)s+=getVal(SFX_D10,m,j,paceView)+getVal(WOMS_D10,m,j,paceView);row[m]=s;});return row;}),[paceView]);
  const paceSourceData=useMemo(()=>Array.from({length:10},(_,i)=>{const row={day:"Day "+(i+1),SFX:0,WOMS:0};MONTHS_ORDER.forEach(m=>{row.SFX+=getVal(SFX_D10,m,i,paceView);row.WOMS+=getVal(WOMS_D10,m,i,paceView);});return row;}),[paceView]);
  const paceSummary=MONTHS_ORDER.map(m=>{
    const sfxDays=SFX_D10[m]||[];const womsDays=WOMS_D10[m]||[];

    const sfxT=sfxDays.reduce((s,d)=>s+d.t,0);const womsT=womsDays.reduce((s,d)=>s+d.t,0);
    const totA=sfxA+womsA;const totT=sfxT+womsT;const totH=Math.round((sfxDays.reduce((s,d)=>s+d.min,0)+womsDays.reduce((s,d)=>s+d.min,0))/60);
    const moRow=MONTHLY.find(r=>r.m===m);const fullA=moRow?moRow.totA:0;
    return{m,sfxA,womsA,totA,sfxT,womsT,totT,totH,fullA,pct:fullA>0?Math.round((totA/fullA)*100):null};

  // Bandwidth utilization data

    const bizDays=BIZ_DAYS[bwMonth]||20;

    WOMS_DES.filter(r=>r.m===bwMonth).forEach(r=>{if(!map[r.d])map[r.d]={name:r.d,sfxMin:0,womsMin:0};map[r.d].womsMin+=r.min;});
    const rows=Object.values(map).map(d=>{
      const sfxH=parseFloat((d.sfxMin/60).toFixed(1));
      const womsH=parseFloat((d.womsMin/60).toFixed(1));
      const totH=parseFloat((sfxH+womsH).toFixed(1));
      const util=Math.min(Math.round((totH/capacity)*100),100);
      return{name:d.name,sfxH,womsH,totH,capacity,util,sfxPct:Math.min((sfxH/capacity)*100,100),womsPct:Math.min((womsH/capacity)*100,100)};
    });
    if(bwSort==="util")return rows.sort((a,b)=>b.util-a.util);
    if(bwSort==="sfx")return rows.sort((a,b)=>b.sfxH-a.sfxH);
    if(bwSort==="woms")return rows.sort((a,b)=>b.womsH-a.womsH);
    return rows.sort((a,b)=>a.name.localeCompare(b.name));

            </div>

        </div>

        {tab==="trends"&&(

            <div style={{display:"flex",gap:6,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
              <span style={{fontSize:11,fontWeight:700,color:MUTED,marginRight:4}}>View:</span>
              {[["assets","Design Assets"],["tasks","Tasks"],["hours","Hours"]].map(([k,l])=><Pill key={k} active={view===k} label={l} onClick={()=>setView(k)} color={SFX_C}/>)}
            </div>
            <Box title={vLabel[view]+" per month — SFX vs WOMS"}>
              <ResponsiveContainer width="100%" height={240}>
                <BarChart data={trendData} margin={{left:0,right:12}}>
                  <CartesianGrid strokeDasharray="3 3" stroke={CARD}/><XAxis dataKey="m" tick={{fontSize:10,fill:MUTED}}/><YAxis tick={{fontSize:10,fill:MUTED}}/>
                  <Tooltip content={<Tip/>}/><Legend wrapperStyle={{fontSize:10,color:MUTED}}/>
                  <Bar dataKey="SFX" stackId="a" fill={SFX_C} name="SFX Creative" barSize={30}/>
                  <Bar dataKey="WOMS" stackId="a" fill={WOMS_C} name="WOMS" barSize={30} radius={[4,4,0,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </Box>
            <Box title="Monthly rework rate — SFX vs WOMS vs combined">
              <ResponsiveContainer width="100%" height={200}>
                <ComposedChart data={MONTHLY.map(r=>({m:r.m,SFX:r.sfxRwPct,WOMS:r.womsRwPct,Combined:r.rwPct}))} margin={{left:0,right:12}}>
                  <CartesianGrid strokeDasharray="3 3" stroke={CARD}/><XAxis dataKey="m" tick={{fontSize:10,fill:MUTED}}/><YAxis tick={{fontSize:10,fill:MUTED}} unit="%" domain={[0,40]}/>
                  <Tooltip content={<Tip/>}/><Legend wrapperStyle={{fontSize:10,color:MUTED}}/>
                  <Line type="monotone" dataKey="SFX" stroke={SFX_C} strokeWidth={2} dot={{r:3}} name="SFX %"/>
                  <Line type="monotone" dataKey="WOMS" stroke={WOMS_C} strokeWidth={2} dot={{r:3}} name="WOMS %"/>
                  <Line type="monotone" dataKey="Combined" stroke={YEL} strokeWidth={2} strokeDasharray="5 3" dot={{r:3}} name="Combined %"/>
                </ComposedChart>
              </ResponsiveContainer>
            </Box>
          </div>
        )}

        {tab==="designers"&&(
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:8,marginBottom:12}}>
              <Stat label="Total Designers" value={des6mo.length} sub="6-month roster" color="#0c4a6e"/>
              <Stat label="Total Assets" value={n(agg(des6mo,"totA"))} color="#059669"/>
              <Stat label="Total Tasks" value={n(agg(des6mo,"totT"))} color={SFX_C}/>
              <Stat label="Total Hours" value={n(Math.round(agg(des6mo,"totMin")/60))} color={WOMS_C}/>
              <Stat label="Avg Assets" value={n(Math.round(agg(des6mo,"totA")/Math.max(des6mo.length,1)))} sub="per designer" color="#7c3aed"/>
            </div>
            <Box title="Total assets per designer — 6-month combined (SFX + WOMS)">
              <ResponsiveContainer width="100%" height={620}>
                <BarChart data={des6mo} layout="vertical" margin={{left:10,right:55,top:5,bottom:5}}>
                  <CartesianGrid strokeDasharray="3 3" stroke={CARD}/><XAxis type="number" tick={{fontSize:9,fill:MUTED}}/><YAxis type="category" dataKey="name" width={140} tick={{fontSize:9,fill:"#cbd5e1"}}/>
                  <Tooltip content={<Tip/>}/><Legend wrapperStyle={{fontSize:10,color:MUTED}}/>
                  <Bar dataKey="sfxA" stackId="a" fill={SFX_C} name="SFX Assets"/>
                  <Bar dataKey="womsA" stackId="a" fill={WOMS_C} name="WOMS Assets" radius={[0,4,4,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </Box>
            <div style={{height:10}}/>
            <Box title="Designer summary — 6-month total (sorted by total assets)">
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>{["Designer","SFX Assets","WOMS Assets","Total Assets","Tasks","Hours","Avg Min/Task"].map(h=><th key={h} style={thS(h.includes("Assets"),h==="Designer")}>{h}</th>)}</tr></thead>
                  <tbody>{des6mo.map((d,i)=>{const avg=d.totT>0?(d.totMin/d.totT).toFixed(1):"0";return(
                    <tr key={d.name} style={rowBg(i)}>
                      <td style={tdS({l:true,b:true,c:TEXT})}>{d.name}</td>
                      <td style={tdS({m:true,c:"#67e8f9"})}>{d.sfxA>0?n(d.sfxA):"-"}</td><td style={tdS({m:true,c:"#fda4af"})}>{d.womsA>0?n(d.womsA):"-"}</td>
                      <td style={tdS({b:true,c:"#34d399"})}>{n(d.totA)}</td><td style={tdS({c:"#cbd5e1"})}>{n(d.totT)}</td>
                      <td style={tdS({c:MUTED})}>{d.totH}</td><td style={tdS({b:true,c:parseFloat(avg)>45?"#f87171":"#4ade80"})}>{avg}</td>
                    </tr>);})}</tbody>
                </table>
              </div>
            </Box>
          </div>
        )}

        {tab==="history"&&(
          <div>
            <div style={{background:CARD,borderRadius:10,padding:"10px 14px",marginBottom:12,display:"flex",flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:11,fontWeight:700,color:MUTED,marginRight:6}}>Designer:</span>
              {allDes.map(d=><Pill key={d} active={selDes===d} label={d==="All"?"All":d.split(" ")[0]} onClick={()=>setSelDes(d)} color={d==="All"?"#94a3b8":SFX_C}/>)}
            </div>
            <Box title={(selDes==="All"?"All designers":"Designer: "+selDes)+" — monthly assets (SFX + WOMS)"}>
              <ResponsiveContainer width="100%" height={220}>
                <BarChart data={desMoHistory} margin={{left:0,right:12}}>
                  <CartesianGrid strokeDasharray="3 3" stroke={CARD}/><XAxis dataKey="m" tick={{fontSize:10,fill:MUTED}}/><YAxis tick={{fontSize:10,fill:MUTED}}/>
                  <Tooltip content={<Tip/>}/><Legend wrapperStyle={{fontSize:10,color:MUTED}}/>
                  <Bar dataKey="sfxA" stackId="a" fill={SFX_C} name="SFX Assets" barSize={30}/>
                  <Bar dataKey="womsA" stackId="a" fill={WOMS_C} name="WOMS Assets" barSize={30} radius={[4,4,0,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </Box>
            {selDes!=="All"&&(<div><div style={{height:10}}/>
              <Box title={"Monthly breakdown — "+selDes}>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse"}}>
                    <thead><tr>{["Month","SFX Tasks","SFX Assets","SFX Hrs","WOMS Tasks","WOMS Assets","WOMS Hrs","Total Assets","Total Hrs"].map(h=><th key={h} style={thS(h.includes("Assets"),h==="Month")}>{h}</th>)}</tr></thead>
                    <tbody>{desDetail.map((r,i)=>(
                      <tr key={r.m} style={rowBg(i)}>
                        <td style={tdS({l:true,b:true,c:TEXT})}>{r.m}</td>
                        <td style={tdS({c:SFX_C})}>{r.sfxT||"-"}</td><td style={tdS({m:true,c:"#67e8f9"})}>{r.sfxA>0?n(r.sfxA):"-"}</td><td style={tdS({c:MUTED})}>{r.sfxH||"-"}</td>
                        <td style={tdS({c:WOMS_C})}>{r.womsT||"-"}</td><td style={tdS({m:true,c:"#fda4af"})}>{r.womsA>0?n(r.womsA):"-"}</td><td style={tdS({c:MUTED})}>{r.womsH||"-"}</td>
                        <td style={tdS({b:true,c:"#34d399"})}>{n(r.totA)}</td><td style={tdS({b:true,c:TEXT})}>{r.totH||"-"}</td>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </Box>
            </div>)}
          </div>
        )}

        {tab==="pace"&&(
          <div>
            <div style={{background:CARD,borderRadius:10,padding:"10px 14px",marginBottom:12,fontSize:11,color:MUTED}}>
              SFX Creative + WOMS combined &middot; First 10 working days per month &middot; Weekends excluded &middot; Mar 26 day 10 = Mar 13 (partial as of refresh date)
            </div>
            <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:11,fontWeight:700,color:MUTED,marginRight:4}}>Metric:</span>
              {[["assets","Assets"],["tasks","Tasks"],["hours","Hours"]].map(([k,l])=><Pill key={k} active={paceView===k} label={l} onClick={()=>setPaceView(k)} color="#0891b2"/>)}
              <div style={{width:1,height:20,background:BORD,margin:"0 4px"}}/>
              <span style={{fontSize:11,fontWeight:700,color:MUTED,marginRight:4}}>Chart:</span>
              <Pill active={paceChart==="daily"} label="Daily" onClick={()=>setPaceChart("daily")} color="#7c3aed"/>
              <Pill active={paceChart==="cumulative"} label="Cumulative" onClick={()=>setPaceChart("cumulative")} color="#7c3aed"/>
              <Pill active={paceChart==="source"} label="SFX vs WOMS" onClick={()=>setPaceChart("source")} color="#d97706"/>
            </div>
            {paceChart!=="source"&&(
              <Box title={(paceChart==="daily"?"Daily ":"Cumulative ")+vLabel[paceView]+" — First 10 Working Days (SFX + WOMS Combined)"}>
                <ResponsiveContainer width="100%" height={300}>
                  {paceChart==="daily"?(
                    <BarChart data={paceDailyData} margin={{left:0,right:12}}>
                      <CartesianGrid strokeDasharray="3 3" stroke={CARD}/><XAxis dataKey="day" tick={{fontSize:10,fill:MUTED}}/><YAxis tick={{fontSize:10,fill:MUTED}}/>
                      <Tooltip content={<Tip/>}/><Legend wrapperStyle={{fontSize:10,color:MUTED}}/>
                      {MONTHS_ORDER.map(m=><Bar key={m} dataKey={m} fill={MO_COLORS[m]} name={m} barSize={14} radius={[2,2,0,0]}/>)}
                    </BarChart>
                  ):(
                    <ComposedChart data={paceCumData} margin={{left:0,right:12}}>
                      <CartesianGrid strokeDasharray="3 3" stroke={CARD}/><XAxis dataKey="day" tick={{fontSize:10,fill:MUTED}}/><YAxis tick={{fontSize:10,fill:MUTED}}/>
                      <Tooltip content={<Tip/>}/><Legend wrapperStyle={{fontSize:10,color:MUTED}}/>
                      {MONTHS_ORDER.map(m=><Line key={m} type="monotone" dataKey={m} stroke={MO_COLORS[m]} strokeWidth={2.5} dot={{r:4,fill:MO_COLORS[m],stroke:BG,strokeWidth:1.5}} name={m}/>)}
                    </ComposedChart>
                  )}
                </ResponsiveContainer>
              </Box>
            )}
            {paceChart==="source"&&(
              <Box title={"SFX vs WOMS "+vLabel[paceView]+" by Day Position (All Months Combined)"}>
                <ResponsiveContainer width="100%" height={280}>
                  <BarChart data={paceSourceData} margin={{left:0,right:12}}>
                    <CartesianGrid strokeDasharray="3 3" stroke={CARD}/><XAxis dataKey="day" tick={{fontSize:10,fill:MUTED}}/><YAxis tick={{fontSize:10,fill:MUTED}}/>
                    <Tooltip content={<Tip/>}/><Legend wrapperStyle={{fontSize:10,color:MUTED}}/>
                    <Bar dataKey="SFX" stackId="a" fill={SFX_C} name="SFX Creative" barSize={30}/>
                    <Bar dataKey="WOMS" stackId="a" fill={WOMS_C} name="WOMS" barSize={30} radius={[4,4,0,0]}/>
                  </BarChart>
                </ResponsiveContainer>
              </Box>
            )}
            <div style={{height:10}}/>
            <Box title="10-day totals — SFX + WOMS combined vs full month">
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>{["Month","SFX Assets","WOMS Assets","Combined Assets","SFX Tasks","WOMS Tasks","Total Tasks","Total Hours","Full Mo Assets","% of Month"].map(h=><th key={h} style={thS(h.includes("Combined")||h.includes("%"),h==="Month")}>{h}</th>)}</tr></thead>
                  <tbody>{paceSummary.map((r,i)=>(
                    <tr key={r.m} style={rowBg(i)}>
                      <td style={{...tdS({l:true,b:true}),color:MO_COLORS[r.m]}}>{r.m}</td>
                      <td style={tdS({c:"#67e8f9"})}>{r.sfxA.toLocaleString()}</td><td style={tdS({c:"#fda4af"})}>{r.womsA.toLocaleString()}</td>
                      <td style={tdS({b:true,c:"#34d399"})}>{r.totA.toLocaleString()}</td><td style={tdS({c:SFX_C})}>{r.sfxT.toLocaleString()}</td>
                      <td style={tdS({c:WOMS_C})}>{r.womsT.toLocaleString()}</td><td style={tdS({b:true,c:TEXT})}>{r.totT.toLocaleString()}</td>
                      <td style={tdS({c:MUTED})}>{r.totH}</td><td style={tdS({c:"#94a3b8"})}>{r.fullA.toLocaleString()}</td>
                      <td style={tdS({b:true,c:r.pct>=80?"#4ade80":r.pct>=50?"#facc15":"#f87171"})}>{r.pct!=null?r.pct+"%":"—"}</td>
                    </tr>
                  ))}</tbody>
                </table>
              </div>
            </Box>
            <div style={{height:10}}/>
            <Box title="Daily asset detail — first 10 working days (SFX + WOMS combined)">
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>
                    {["Day","Oct 25","Nov 25","Dec 25","Jan 26","Feb 26","Mar 26*"].map(h=>(
                      <th key={h} style={{...thS(false,h==="Day"),color:MO_COLORS[h]||MUTED,whiteSpace:"nowrap"}}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>{Array.from({length:10},(_,i)=>{
                    const vals=MONTHS_ORDER.map(m=>{const s=SFX_D10[m]&&SFX_D10[m][i]?SFX_D10[m][i].a:0;const w=WOMS_D10[m]&&WOMS_D10[m][i]?WOMS_D10[m][i].a:0;return s+w>0?s+w:null;});
                    const maxVal=Math.max(...vals.filter(v=>v!=null));
                    return(<tr key={i} style={rowBg(i)}>
                      <td style={tdS({l:true,b:true,c:"#94a3b8"})}>Day {i+1}</td>
                      {vals.map((v,j)=>(
                        <td key={j} style={tdS({b:v===maxVal,c:v===maxVal?"#34d399":"#cbd5e1"})}>
                          {v!=null?(<span>{v.toLocaleString()}<span style={{fontSize:9,color:MUTED,marginLeft:3}}>({SFX_D10[MONTHS_ORDER[j]]&&SFX_D10[MONTHS_ORDER[j]][i]?SFX_D10[MONTHS_ORDER[j]][i].a:0}+{WOMS_D10[MONTHS_ORDER[j]]&&WOMS_D10[MONTHS_ORDER[j]][i]?WOMS_D10[MONTHS_ORDER[j]][i].a:0})</span></span>):"-"}
                        </td>
                      ))}
                    </tr>);
                  })}</tbody>
                </table>
              </div>
            </Box>
          </div>
        )}

        {/* ── HOURS UTILIZATION ── */}
        {tab==="bandwidth"&&(
          <div>
            {/* Controls */}
            <div style={{display:"flex",gap:6,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
              <span style={{fontSize:11,fontWeight:700,color:MUTED,marginRight:4}}>Month:</span>
              {MONTHS_ORDER.map(m=><Pill key={m} active={bwMonth===m} label={m} onClick={()=>setBwMonth(m)} color={MO_COLORS[m]}/>)}
              <div style={{width:1,height:20,background:BORD,margin:"0 4px"}}/>
              <span style={{fontSize:11,fontWeight:700,color:MUTED,marginRight:4}}>Sort:</span>
              <Pill active={bwSort==="util"} label="Utilization" onClick={()=>setBwSort("util")} color="#94a3b8"/>
              <Pill active={bwSort==="sfx"} label="SFX hours" onClick={()=>setBwSort("sfx")} color={SFX_C}/>
              <Pill active={bwSort==="woms"} label="WOMS hours" onClick={()=>setBwSort("woms")} color={WOMS_C}/>
              <Pill active={bwSort==="name"} label="Name" onClick={()=>setBwSort("name")} color="#94a3b8"/>
            </div>

            {/* Team summary stats */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:8,marginBottom:12}}>
              <Stat label="Designers" value={bwData.length} sub={bwMonth} color="#0c4a6e"/>
              <Stat label="Capacity" value={n(bwTotCapacity)+"h"} sub={bwBizDays+" biz days × 8h × "+bwData.length} color="#334155"/>
              <Stat label="SFX Hours" value={n(Math.round(bwTotSfx))} color={SFX_C}/>
              <Stat label="WOMS Hours" value={n(Math.round(bwTotWoms))} color={WOMS_C}/>
              <Stat label="Total Worked" value={n(Math.round(bwTotWorked))+"h"} color="#059669"/>
              <Stat label="Team Utilization" value={bwTeamUtil+"%"} sub={n(Math.round(bwTotWorked))+"h / "+n(bwTotCapacity)+"h"} color={bwTeamUtil>=75?"#4ade80":bwTeamUtil>=40?"#facc15":"#f87171"}/>
            </div>

            {/* Legend */}
            <div style={{display:"flex",gap:16,marginBottom:12,alignItems:"center",flexWrap:"wrap"}}>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:MUTED}}>
                <div style={{width:16,height:10,borderRadius:2,background:SFX_C}}/>SFX hours
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:MUTED}}>
                <div style={{width:16,height:10,borderRadius:2,background:WOMS_C}}/>WOMS hours
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:11,color:MUTED}}>
                <div style={{width:16,height:10,borderRadius:2,background:"#1e3a5f",border:"1px solid #334155"}}/>Available capacity ({bwBizDays} days × 8h = {bwCapacity}h)
              </div>
            </div>

            {/* Utilization bars */}
            <div style={{background:CARD,borderRadius:10,padding:"16px 20px",marginBottom:12}}>
              <div style={{fontSize:12,fontWeight:700,color:TEXT,marginBottom:16}}>{bwMonth} — Designer Hours vs Capacity ({bwBizDays} business days)</div>
              {bwData.map((d,i)=>{
                const sfxW=Math.min(d.sfxPct,100);
                const womsW=Math.min(d.womsPct,100-sfxW);
                const overCap=d.totH>d.capacity;
                return(
                  <div key={d.name} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
                      <span style={{fontSize:12,fontWeight:500,color:TEXT,minWidth:160}}>{d.name}</span>
                      <div style={{display:"flex",gap:10,alignItems:"center"}}>
                        <span style={{fontSize:10,color:"#67e8f9"}}>{d.sfxH}h SFX</span>
                        <span style={{fontSize:10,color:"#fda4af"}}>{d.womsH}h WOMS</span>
                        <span style={{fontSize:11,fontWeight:700,color:overCap?"#f87171":d.util>=75?"#4ade80":d.util>=40?"#facc15":"#94a3b8",minWidth:38,textAlign:"right"}}>{d.util}%</span>
                        <span style={{fontSize:10,color:MUTED,minWidth:70,textAlign:"right"}}>{d.totH}h / {d.capacity}h</span>
                      </div>
                    </div>
                    {/* The bar track */}
                    <div style={{width:"100%",height:14,background:"#0f2744",borderRadius:7,overflow:"hidden",position:"relative",border:"1px solid #1e3a5f"}}>
                      {/* SFX portion */}
                      {sfxW>0&&<div style={{position:"absolute",left:0,top:0,bottom:0,width:sfxW+"%",background:SFX_C,borderRadius:sfxW+womsW>=99?"7px":"7px 0 0 7px"}}/>}
                      {/* WOMS portion */}
                      {womsW>0&&<div style={{position:"absolute",left:sfxW+"%",top:0,bottom:0,width:womsW+"%",background:WOMS_C,borderRadius:sfxW+womsW>=99?"0 7px 7px 0":womsW>0&&sfxW===0?"7px 0 0 7px":"0"}}/>}
                      {/* Over-capacity marker */}
                      {overCap&&<div style={{position:"absolute",right:0,top:0,bottom:0,width:3,background:"#f87171"}}/>}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Summary table */}
            <Box title={"Utilization detail — "+bwMonth}>
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse"}}>
                  <thead><tr>
                    {["Designer","SFX Hours","WOMS Hours","Total Hours","Capacity","Utilization","Remaining"].map(h=>(
                      <th key={h} style={thS(h==="Utilization",h==="Designer")}>{h}</th>
                    ))}
                  </tr></thead>
                  <tbody>{bwData.map((d,i)=>{
                    const remaining=Math.max(0,d.capacity-d.totH);
                    return(
                      <tr key={d.name} style={rowBg(i)}>
                        <td style={tdS({l:true,b:true,c:TEXT})}>{d.name}</td>
                        <td style={tdS({c:"#67e8f9",m:true})}>{d.sfxH}</td>
                        <td style={tdS({c:"#fda4af",m:true})}>{d.womsH}</td>
                        <td style={tdS({b:true,c:TEXT})}>{d.totH}</td>
                        <td style={tdS({c:MUTED})}>{d.capacity}h</td>
                        <td style={tdS({b:true,c:d.util>=75?"#4ade80":d.util>=40?"#facc15":"#f87171"})}>{d.util}%</td>
                        <td style={tdS({c:MUTED})}>{remaining>0?remaining+"h":"—"}</td>
                      </tr>
                    );
                  })}</tbody>
                </table>
              </div>
            </Box>
          </div>
        )}

      </div>
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(
      React.createElement(Dashboard)
    );
  </script>
</body>
</html>
